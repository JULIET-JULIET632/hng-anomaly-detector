version: '3'
services:
  nginx:
    image: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - HNG-nginx-logs:/var/log/nginx
    ports:
      - "80:80"
    depends_on:
      - nextcloud

  nextcloud:
    image: kefaslungu/hng-nextcloud
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro

  detector:
    build: ./detector
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
    network_mode: "host"
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

volumes:
  HNG-nginx-logs:
